services:
  - type: web
    name: getyourguide-forecast
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Dev keys so the dashboard's prefilled key works out of the box.
      # Rotate these before sharing the URL publicly.
      - key: LOB_API_KEYS
        value: "dev-key-default:default"
      - key: LOB_ADMIN_KEYS
        value: "dev-admin-key"
      # Optional: set in the Render dashboard to enable the AI summary feature.
      - key: ANTHROPIC_API_KEY
        sync: false
